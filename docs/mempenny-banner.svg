<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 104" role="img" aria-labelledby="bt bd" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title id="bt">MemPenny — memory hygiene for AI coding agents</title>
  <desc id="bd">MemPenny: a minted-coin MP logo, the wordmark, and the hook "Your agent's memory piles up. MemPenny keeps it sharp."</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#172033"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coin" cx="0.34" cy="0.28" r="0.85">
      <stop offset="0" stop-color="#fef3c7"/>
      <stop offset="0.45" stop-color="#fbbf24"/>
      <stop offset="0.8" stop-color="#d97706"/>
      <stop offset="1" stop-color="#92400e"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1200" height="104" rx="16" fill="url(#bg)"/>
  <ellipse cx="150" cy="52" rx="240" ry="74" fill="url(#glow)"/>

  <!-- subtle right-side balance -->
  <circle cx="1095" cy="52" r="32" fill="none" stroke="#f59e0b" stroke-width="1.6" opacity="0.10"/>
  <circle cx="1145" cy="26" r="3" fill="#fbbf24" opacity="0.30"/>
  <circle cx="1040" cy="74" r="3" fill="#f59e0b" opacity="0.25"/>

  <!-- minted coin logo (MP monogram), centered on the midline -->
  <g>
    <circle cx="54" cy="52" r="34" fill="url(#coin)"/>
    <circle cx="54" cy="52" r="34" fill="none" stroke="#7c2d12" stroke-width="3" stroke-dasharray="1.2 2.4" opacity="0.85"/>
    <circle cx="54" cy="52" r="26" fill="none" stroke="#fde68a" stroke-width="1.1" opacity="0.55"/>
    <text x="54" y="53" text-anchor="middle" dominant-baseline="central" font-size="22" font-weight="800" letter-spacing="-0.8" fill="#7c2d12">MP</text>
  </g>

  <!-- wordmark, baseline-aligned with the hook -->
  <text x="102" y="63" font-size="31" font-weight="800" letter-spacing="-0.5">
    <tspan fill="#f8fafc">Mem</tspan><tspan fill="#f59e0b">Penny</tspan>
  </text>

  <!-- brand / hook divider -->
  <line x1="278" y1="34" x2="278" y2="72" stroke="#f59e0b" stroke-width="1.5" opacity="0.5"/>

  <!-- hook: one continuous sentence, same baseline as the wordmark -->
  <text x="298" y="63" font-size="23" font-weight="700">
    <tspan fill="#f8fafc">Your agent&#8217;s memory piles up. MemPenny keeps it </tspan><tspan fill="#f59e0b">sharp</tspan><tspan fill="#f8fafc">.</tspan>
  </text>
</svg>
